services:
  - type: worker
    name: api-key-scanner
    env: docker
    dockerfilePath: ./Dockerfile
    # ──────────────────────────────────────────────
    # $450/mo = Pro Ultra = 8 CPU / 32 GB RAM
    # See render.com/pricing for plan options:
    #   starter     $7/mo   0.5 CPU   512 MB
    #   standard   $25/mo   1  CPU     2 GB
    #   pro        $85/mo   2  CPU     4 GB
    #   pro_plus  $175/mo   4  CPU     8 GB
    #   pro_max   $225/mo   4  CPU    16 GB
    #   pro_ultra $450/mo   8  CPU    32 GB  ← YOU WANT THIS
    # ──────────────────────────────────────────────
    plan: pro_ultra
    envVars:
      - key: SCAN_TIMEOUT
        value: "1.0"          # Tighter timeout = faster failures = more throughput
      - key: HTTP_TIMEOUT
        value: "4.0"
      - key: MAX_CONCURRENT_SCANS
        value: "2000"          # 8 CPU can push 2k async TCP connects easy
      - key: MAX_CONCURRENT_PROBES
        value: "200"
      - key: IPS_PER_BATCH
        value: "500"           # Bigger batches = less loop overhead
      - key: STATS_INTERVAL_MIN
        value: "15"
      - key: USE_TELEGRAM
        value: "true"
